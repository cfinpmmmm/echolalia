<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>echolalia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a1628;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
    user-select: none;
  }

  canvas#water {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  #app {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  #echolalia-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    font-weight: 300;
    color: rgba(255, 248, 240, 0.92);
    text-align: center;
    max-width: 680px;
    line-height: 1.7;
    letter-spacing: 0.01em;
    opacity: 0;
    transition: opacity 1.2s ease;
    min-height: 3em;
  }

  #echolalia-text.visible { opacity: 1; }
  #echolalia-text.fading { opacity: 0; }

  .text-book-title {
    font-style: italic;
    font-weight: 400;
  }

  .text-book-author {
    font-weight: 400;
    color: rgba(255, 220, 180, 0.9);
  }

  #input-area {
    margin-top: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #input-area.visible { opacity: 1; }

  #mic-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(255, 220, 180, 0.3);
    background: rgba(255, 255, 255, 0.06);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    position: relative;
  }

  #mic-btn:hover {
    border-color: rgba(255, 220, 180, 0.6);
    background: rgba(255, 255, 255, 0.1);
  }

  /* On-air state: immediate snap, solid red, no animation */
  #mic-btn.listening {
    border-color: rgba(200, 50, 40, 1);
    background: rgba(200, 50, 40, 0.35);
    box-shadow: 0 0 20px rgba(200, 50, 40, 0.25);
  }

  #mic-btn svg { width: 24px; height: 24px; fill: rgba(255, 248, 240, 0.7); }
  #mic-btn.listening svg { fill: rgba(255, 255, 255, 0.95); }

  #mic-hint {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 300;
    color: rgba(255, 248, 240, 0.22);
    letter-spacing: 0.04em;
    margin-top: -0.5rem;
    transition: all 0.15s ease;
  }

  #mic-hint.listening {
    color: rgba(200, 50, 40, 0.8);
    letter-spacing: 0.08em;
  }

  #text-input-wrapper {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    opacity: 0.35;
    transition: opacity 0.4s ease;
  }

  #text-input-wrapper:focus-within { opacity: 0.8; }

  #text-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255, 220, 180, 0.15);
    border-radius: 0;
    padding: 0.4rem 0.2rem;
    color: rgba(255, 248, 240, 0.7);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 300;
    width: min(260px, 55vw);
    outline: none;
    transition: border-color 0.3s ease;
  }

  #text-input::placeholder { color: rgba(255, 248, 240, 0.2); font-style: italic; }
  #text-input:focus { border-color: rgba(255, 220, 180, 0.35); }

  #send-btn {
    background: none;
    border: none;
    width: 28px; height: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    opacity: 0.5;
  }

  #send-btn:hover { opacity: 0.9; }
  #send-btn svg { width: 14px; height: 14px; fill: rgba(255, 248, 240, 0.5); }

  #skip-btn {
    background: none;
    border: none;
    color: rgba(255, 248, 240, 0.3);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    cursor: pointer;
    padding: 0.4rem 1rem;
    transition: color 0.3s ease;
  }

  #skip-btn:hover { color: rgba(255, 248, 240, 0.55); }

  #feedback-area {
    margin-top: 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #feedback-area.visible { opacity: 1; }

  .feedback-btn {
    background: none;
    border: 1px solid rgba(255, 220, 180, 0.2);
    border-radius: 2rem;
    padding: 0.6rem 1.6rem;
    color: rgba(255, 248, 240, 0.7);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .feedback-btn:hover {
    border-color: rgba(255, 220, 180, 0.5);
    color: rgba(255, 248, 240, 0.95);
  }

  .feedback-btn svg { width: 16px; height: 16px; fill: currentColor; }

  #start-btn {
    background: none;
    border: 1px solid rgba(255, 220, 180, 0.25);
    border-radius: 2rem;
    padding: 0.8rem 2.4rem;
    color: rgba(255, 248, 240, 0.8);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.5s ease;
    opacity: 0;
    transition: opacity 0.8s ease, border-color 0.3s ease, color 0.3s ease;
  }

  #start-btn.visible { opacity: 1; }
  #start-btn:hover {
    border-color: rgba(255, 220, 180, 0.6);
    color: rgba(255, 248, 240, 1);
  }

  #title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    font-weight: 300;
    color: rgba(255, 248, 240, 0.9);
    letter-spacing: 0.12em;
    margin-bottom: 0.8rem;
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  #title.visible { opacity: 1; }

  #subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2vw, 1.2rem);
    font-weight: 300;
    font-style: italic;
    color: rgba(255, 220, 180, 0.5);
    margin-bottom: 2.5rem;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  #subtitle.visible { opacity: 1; }

  #user-echo { display: none; }

  #restart-btn {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: none;
    border: 1px solid rgba(255, 220, 180, 0.15);
    border-radius: 2rem;
    padding: 0.5rem 1.2rem;
    color: rgba(255, 248, 240, 0.25);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    z-index: 10;
  }

  #restart-btn.visible { opacity: 1; }
  #restart-btn:hover { color: rgba(255, 248, 240, 0.5); border-color: rgba(255, 220, 180, 0.35); }

  .feedback-btn#shelf-btn {
    border-color: rgba(255, 220, 180, 0.15);
    color: rgba(255, 248, 240, 0.5);
  }

  #shelf-view-btn {
    position: fixed;
    bottom: 2rem;
    left: 2rem;
    background: none;
    border: 1px solid rgba(255, 220, 180, 0.15);
    border-radius: 2rem;
    padding: 0.5rem 1.2rem;
    color: rgba(255, 248, 240, 0.25);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    z-index: 10;
  }

  #shelf-view-btn.visible { opacity: 1; }
  #shelf-view-btn:hover { color: rgba(255, 248, 240, 0.5); border-color: rgba(255, 220, 180, 0.35); }

  #shelf-panel {
    position: fixed;
    top: 0; right: -400px;
    width: min(380px, 85vw);
    height: 100vh;
    background: rgba(10, 22, 40, 0.95);
    backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255, 220, 180, 0.1);
    z-index: 20;
    padding: 2.5rem 2rem;
    overflow-y: auto;
    transition: right 0.5s ease;
  }

  #shelf-panel.open { right: 0; }

  #shelf-panel h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: rgba(255, 248, 240, 0.85);
    margin-bottom: 0.3rem;
  }

  #shelf-panel .shelf-subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 300;
    color: rgba(255, 248, 240, 0.3);
    margin-bottom: 2rem;
  }

  .shelf-book {
    margin-bottom: 1.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(255, 220, 180, 0.06);
  }

  .shelf-book-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 400;
    font-style: italic;
    color: rgba(255, 248, 240, 0.85);
  }

  .shelf-book-author {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    font-weight: 300;
    color: rgba(255, 220, 180, 0.6);
  }

  .shelf-book-reason {
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    color: rgba(255, 248, 240, 0.4);
    line-height: 1.5;
    margin-top: 0.4rem;
  }

  #shelf-actions {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
  }

  .shelf-action-btn {
    background: none;
    border: 1px solid rgba(255, 220, 180, 0.2);
    border-radius: 2rem;
    padding: 0.5rem 1.2rem;
    color: rgba(255, 248, 240, 0.6);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .shelf-action-btn:hover {
    border-color: rgba(255, 220, 180, 0.5);
    color: rgba(255, 248, 240, 0.9);
  }

  #shelf-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: none;
    border: none;
    color: rgba(255, 248, 240, 0.3);
    font-size: 1.5rem;
    cursor: pointer;
    transition: color 0.3s ease;
    line-height: 1;
  }

  .panel-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid rgba(255, 220, 180, 0.1);
  }

  .panel-tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 0.5rem 1rem;
    color: rgba(255, 248, 240, 0.3);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .panel-tab:hover { color: rgba(255, 248, 240, 0.5); }
  .panel-tab.active { color: rgba(255, 248, 240, 0.8); border-bottom-color: rgba(255, 220, 180, 0.5); }

  .panel-content { display: none; }
  .panel-content.active { display: block; }

  .history-entry { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255, 220, 180, 0.06); }
  .history-you-said { font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 300; color: rgba(255, 220, 180, 0.3); margin-bottom: 0.4rem; font-style: italic; }
  .history-book-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; font-style: italic; color: rgba(255, 248, 240, 0.85); }
  .history-book-author { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-weight: 300; color: rgba(255, 220, 180, 0.6); }
  .history-action { font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 300; color: rgba(255, 248, 240, 0.2); margin-top: 0.3rem; }
  .history-empty { font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 300; color: rgba(255, 248, 240, 0.25); font-style: italic; }

  #shelf-close:hover { color: rgba(255, 248, 240, 0.6); }

  #shelf-copied {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 300;
    color: rgba(255, 220, 180, 0.6);
    opacity: 0;
    transition: opacity 0.4s ease;
    margin-top: 0.8rem;
  }

  #shelf-copied.visible { opacity: 1; }
</style>
</head>
<body>

<canvas id="water"></canvas>

<div id="app">
  <div id="title">echolalia</div>
  <div id="subtitle">a book for right now</div>
  <button id="start-btn">begin</button>
  <div id="user-echo"></div>
  <div id="echolalia-text"></div>
  <div id="input-area">
    <button id="mic-btn">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <div id="mic-hint">hold space to speak</div>
    <div id="text-input-wrapper">
      <input type="text" id="text-input" placeholder="or type instead" />
      <button id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <button id="skip-btn">skip this one</button>
  </div>
  <div id="feedback-area">
    <button class="feedback-btn" id="shelf-btn">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
      save to shelf
    </button>
    <button class="feedback-btn" id="read-it-btn">
      <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
      I've read it
    </button>
    <button class="feedback-btn" id="try-again-btn">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      not for me
    </button>
  </div>
</div>

<div id="shelf-panel">
  <button id="shelf-close">&times;</button>
  <div class="panel-tabs">
    <button class="panel-tab active" data-tab="shelf">shelf</button>
    <button class="panel-tab" data-tab="history">history</button>
    <button class="panel-tab" data-tab="feedback">thoughts?</button>
  </div>
  <div id="tab-shelf" class="panel-content active">
    <div class="shelf-subtitle">books you saved</div>
    <div id="shelf-books"></div>
    <div id="shelf-actions">
      <button class="shelf-action-btn" id="shelf-copy">copy list</button>
      <button class="shelf-action-btn" id="shelf-share">share</button>
    </div>
    <div id="shelf-copied">copied to clipboard</div>
  </div>
  <div id="tab-history" class="panel-content">
    <div class="shelf-subtitle">everything surfaced this session</div>
    <div id="history-books"></div>
  </div>
  <div id="tab-feedback" class="panel-content">
    <div class="shelf-subtitle">tell me what's working and what's not</div>
    <textarea id="feedback-text" placeholder="anything at all — a thought, a complaint, a wish..." style="width: 100%; min-height: 120px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,220,180,0.15); border-radius: 8px; color: rgba(255,248,240,0.8); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 300; padding: 1rem; resize: vertical; outline: none;"></textarea>
    <button class="shelf-action-btn" id="feedback-send" style="margin-top: 1rem;">send</button>
    <div id="feedback-thanks" style="font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 300; color: rgba(255,220,180,0.5); margin-top: 0.8rem; opacity: 0; transition: opacity 0.4s ease;">thank you. this helps.</div>
  </div>
</div>

<button id="shelf-view-btn">your shelf</button>
<button id="restart-btn">start over</button>

<script>
// ─── WATER ANIMATION ───────────────────────────────────────────
const canvas = document.getElementById('water');
const ctx = canvas.getContext('2d');
let W, H;
let waterState = 'still';
let stateIntensity = 0;
let targetIntensity = 0.3;
let time = 0;
let ripples = [];
let voiceEnergy = 0; // 0-1, reactive to mic input

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function setWaterState(state) {
  waterState = state;
  if (state === 'still') targetIntensity = 0.25;
  else if (state === 'listening') targetIntensity = 0.45;
  else if (state === 'pulsing') targetIntensity = 0.8;
  else if (state === 'rippling') targetIntensity = 0.65;
}

function addRipple() {
  ripples.push({
    x: W * (0.2 + Math.random() * 0.6),
    y: H * (0.3 + Math.random() * 0.4),
    r: 0,
    maxR: 150 + Math.random() * 300,
    alpha: 0.3 + Math.random() * 0.2,
    speed: 0.8 + Math.random() * 1.2
  });
}

function drawWater(t) {
  // Slow, breathing state transitions — nothing snaps
  stateIntensity += (targetIntensity - stateIntensity) * 0.012;
  // Voice energy: gentle swell, not jumpy
  const targetEnergy = (waterState === 'listening' || waterState === 'pulsing') ? 0.3 + Math.sin(t * 0.8) * 0.15 : 0;
  voiceEnergy += (targetEnergy - voiceEnergy) * 0.04;

  const si = stateIntensity;
  const ve = voiceEnergy;

  // Deep warm ocean gradient — warm blues fading to amber-teal at depth
  const grad = ctx.createLinearGradient(0, 0, W * 0.15, H);
  grad.addColorStop(0, '#070d1c');
  grad.addColorStop(0.12, '#0c1a35');
  grad.addColorStop(0.30, '#112848');
  grad.addColorStop(0.50, '#17365e');
  grad.addColorStop(0.70, '#1e4568');
  grad.addColorStop(0.85, '#275570');
  grad.addColorStop(1, '#2f5f62');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Warm light — slow drift like late afternoon sun through water
  const lightX = W * (0.48 + Math.sin(t * 0.06) * 0.06);
  const lightY = H * (0.22 + Math.sin(t * 0.04) * 0.04);
  const amberGrad = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, H * 0.9);
  amberGrad.addColorStop(0, `rgba(255, 200, 120, ${0.06 + si * 0.04 + ve * 0.03})`);
  amberGrad.addColorStop(0.25, `rgba(255, 180, 100, ${0.035 + si * 0.02})`);
  amberGrad.addColorStop(0.6, `rgba(210, 150, 90, ${0.01 + si * 0.008})`);
  amberGrad.addColorStop(1, 'rgba(210, 150, 90, 0)');
  ctx.fillStyle = amberGrad;
  ctx.fillRect(0, 0, W, H);

  // Ocean waves — slow, long swells like breathing
  const waveLayers = [
    { y: 0.18, amp: 10, freq: 0.0010, speed: 0.08, r: 14, g: 38, b: 85, a: 0.05 },
    { y: 0.26, amp: 16, freq: 0.0012, speed: 0.10, r: 18, g: 50, b: 100, a: 0.07 },
    { y: 0.34, amp: 22, freq: 0.0008, speed: 0.07, r: 22, g: 60, b: 115, a: 0.09 },
    { y: 0.42, amp: 28, freq: 0.0010, speed: 0.09, r: 28, g: 72, b: 130, a: 0.08 },
    { y: 0.50, amp: 24, freq: 0.0014, speed: 0.12, r: 35, g: 85, b: 142, a: 0.07 },
    { y: 0.58, amp: 20, freq: 0.0018, speed: 0.14, r: 44, g: 98, b: 152, a: 0.06 },
    { y: 0.66, amp: 16, freq: 0.0020, speed: 0.16, r: 54, g: 112, b: 160, a: 0.05 },
    { y: 0.74, amp: 12, freq: 0.0025, speed: 0.18, r: 65, g: 128, b: 168, a: 0.045 },
    { y: 0.82, amp: 8, freq: 0.0030, speed: 0.20, r: 78, g: 142, b: 175, a: 0.035 },
    { y: 0.90, amp: 5, freq: 0.0035, speed: 0.22, r: 90, g: 155, b: 180, a: 0.025 },
  ];

  for (const layer of waveLayers) {
    // Gentle amplitude response — swells, doesn't jolt
    const amp = layer.amp * (0.6 + si * 0.5 + ve * 0.3);
    // Soft breathing pulse, not a visualizer spike
    const breath = ve * Math.sin(t * 0.8 + layer.y * 6) * 4;

    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 3) {
      const baseY = H * layer.y;
      // Long, slow primary swell
      const wave1 = Math.sin(x * layer.freq + t * layer.speed) * amp;
      // Secondary cross-swell, slightly faster, offset
      const wave2 = Math.sin(x * layer.freq * 1.7 + t * layer.speed * 0.5 + 1.9) * amp * 0.3;
      // Deep slow undulation

  vig.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

function animate() {
  time += 0.016;
  drawWater(time);
  if (waterState === 'rippling' && Math.random() < 0.04) addRipple();
  if (waterState === 'listening' && Math.random() < 0.02) addRipple();

}

// Shuffle helper
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPromptSequence() {
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  // Calibration first, "how" last, 1-2 from the soul of the conversation in between
  const middle = shuffle([
    pick(promptPools.anti),
    pick(promptPools.world),
    pick(promptPools.feeling),
  ]).slice(0, 1 + Math.floor(Math.random() * 2)); // 1 or 2

  return [
    pick(promptPools.calibration),
    ...middle,
    pick(promptPools.how),
  ];
}

// Speech recognition setup
let silenceTimer = null;
let fullTranscript = '';
const SILENCE_DELAY = 60000;
let micPermissionGranted = false;
const micHint = document.getElementById('mic-hint');
// Live transcript removed — cleaner UX without it

// Request mic permission once on page load — so the browser caches it
async function requestMicPermission() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(t => t.stop());
    micPermissionGranted = true;
  } catch(e) {
    micBtn.style.display = 'none';
    micHint.style.display = 'none';
  }
}

try {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    speechSupported = true;

    recognition.onresult = (e) => {
      let finalText = '';
      let interimText = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          finalText += e.results[i][0].transcript;
        } else {
          interimText += e.results[i][0].transcript;
        }
      }
      fullTranscript = finalText + interimText;
      // Transcript hidden — mic state is the only feedback
      if (interimText) addRipple();
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        if (fullTranscript.trim()) finishListening(fullTranscript.trim());
      }, SILENCE_DELAY);
    };

    recognition.onerror = (e) => {
      if (e.error !== 'no-speech') stopListening();
    };

    recognition.onend = () => {
      if (micBtn.classList.contains('listening')) {
        if (fullTranscript.trim()) {
          finishListening(fullTranscript.trim());
        } else {
          try { recognition.start(); } catch(e) {}
        }
      }
    };

    // Request permission immediately
    requestMicPermission();
  }
} catch(e) {}

if (!speechSupported) {
  micBtn.style.display = 'none';
}

function startListening() {
  if (!recognition) return;
  fullTranscript = '';
  clearTimeout(silenceTimer);
  micBtn.classList.add('listening');
  micHint.classList.add('listening');
  micHint.textContent = 'on air';
  setWaterState('listening');
  try { recognition.start(); } catch(e) {}
}

function finishListening(text) {
  clearTimeout(silenceTimer);
  micBtn.classList.remove('listening');
  micHint.classList.remove('listening');
  micHint.textContent = 'hold space to speak';
  try { recognition.abort(); } catch(e) {}
  fullTranscript = '';
  handleUserInput(text);
}

function stopListening() {
  if (!recognition) return;
  clearTimeout(silenceTimer);
  micBtn.classList.remove('listening');
  micHint.classList.remove('listening');
  micHint.textContent = 'hold space to speak';
  try { recognition.abort(); } catch(e) {}
  fullTranscript = '';
  try { recognition.stop(); } catch(e) {}
}

function showText(text, callback) {
  textEl.classList.remove('visible');
  textEl.classList.add('fading');
  setTimeout(() => {
    textEl.innerHTML = text;
    textEl.classList.remove('fading');
    textEl.classList.add('visible');
    setWaterState('pulsing');
    setTimeout(() => {
      setWaterState('still');
      if (callback) callback();
    }, 800);
  }, 350);
}

function hideText() {
  textEl.classList.remove('visible');
  textEl.classList.add('fading');
}

// ─── CONVERSATION ──────────────────────────────────────────────
function askNextQuestion() {
  if (currentPromptIndex >= prompts.length) {
    makeRecommendation();
    return;
  }

  // Skip ahead if we have enough signal
  const richResponses = userResponses.filter(r => r.text && r.text.length > 60);
  const shortResponses = userResponses.filter(r => r.text && r.text.length <= 30);
  // Rich answers: 3 rich + at least 2 questions asked → go
  if (richResponses.length >= 3 && currentPromptIndex >= 2) {
    makeRecommendation();
    return;
  }
  // Short answers: if they're being brief, max 4 questions total
  if (userResponses.length >= 4 && shortResponses.length >= 2) {
    makeRecommendation();
    return;
  }

  conversationState = 'asking';
  const prompt = prompts[currentPromptIndex];
  showText(prompt.text, () => {
    conversationState = 'listening';
    setWaterState('listening');
    showInput();
  });
}

let isGiftMode = false;

function handleUserInput(text) {
  if (!text.trim()) return;
  hideInput();
  const t = text.trim();
  const tl = t.toLowerCase();
  const currentPrompt = prompts[currentPromptIndex];

  userResponses.push({
    promptId: currentPrompt?.id || 'extra',
    type: currentPrompt?.type || 'open',
    text: t
  });

  // Detect non-reader on calibration question → pivot to media/feeling
  const isCalibration = currentPrompt && currentPrompt.type === 'calibration';
  const nonReaderCues = ['don\'t read', 'don\'t really read', 'haven\'t read', 'not a reader', 'been a while', 'years ago', 'can\'t remember', 'not much', 'nothing comes to mind', 'i don\'t know'];
  if (isCalibration && nonReaderCues.some(c => tl.includes(c))) {
    currentPromptIndex++;
    setWaterState('rippling');
    addRipple();
    // Skip remaining calibration-type prompts, pivot to something they can answer
    prompts = prompts.filter(p => p.type !== 'calibration');
    currentPromptIndex = 0;
    const pivotPrompts = [
      "That's totally fine. Tell me — what's the last show or film or song that really got you?",
      "No problem at all. What about a show, a movie, a podcast — anything that stuck with you recently?",
      "Perfect starting point. Forget books — what's something you've watched or listened to lately that moved you?",
    ];
    const pivot = pivotPrompts[Math.floor(Math.random() * pivotPrompts.length)];
    showText(pivot, () => {
      conversationState = 'listening';
      setWaterState('listening');
      showInput();
    });
    return;
  }

  // Detect gift-giving intent
  const giftCues = ['for my', 'for a friend', 'for someone', 'gift', 'my dad', 'my mom', 'my partner', 'my wife', 'my husband', 'my sister', 'my brother', 'book club', 'their birthday', 'present'];
  if (!isGiftMode && giftCues.some(c => tl.includes(c))) {
    isGiftMode = true;
    currentPromptIndex++;
    setWaterState('rippling');
    addRipple(); addRipple();
    showText("Tell me about them — what are they like, what do they love, what would surprise them?", () => {
      conversationState = 'listening';
      setWaterState('listening');
      showInput();
    });
    return;
  }

  // Detect specific ask — they already know what they want ("I want a thriller", "something like Fleabag")
  const specificCues = ['i want', 'i\'m looking for', 'give me', 'recommend', 'something like', 'anything like', 'i need a', 'i\'m in the mood for'];
  const hasSpecificAsk = specificCues.some(c => tl.includes(c));
  const hasStrongKeywords = tl.split(' ').length >= 4;
  if (hasSpecificAsk && hasStrongKeywords && userResponses.length >= 1) {
    // They've told us enough — go straight to matching
    currentPromptIndex = prompts.length; // skip remaining
    setWaterState('rippling');
    addRipple(); addRipple(); addRipple();
    setTimeout(() => makeRecommendation(), 400);
    return;
  }

  currentPromptIndex++;
  setWaterState('rippling');
  addRipple(); addRipple();

  setTimeout(() => askNextQuestion(), 400);
}

function skipQuestion() {
  hideInput();
  currentPromptIndex++;
  setTimeout(() => askNextQuestion(), 300);
}

// ─── MATCHING ENGINE ───────────────────────────────────────────
function makeRecommendation() {
  conversationState = 'thinking';
  setWaterState('rippling');
  showText("Let me think...", () => {
    setTimeout(() => {
      const book = findBestMatch();
      if (book) {
        currentRecommendation = book;
        presentRecommendation(book);
      } else {
        showText("I'm sorry — I've shared everything I have that feels right for you. I wish I had more.");
      }
    }, 2000);
  });
}

    if (allText.includes('short') || allText.includes('quick read') || allText.includes('novella')) {

      if (book.length === 'commitment') score -= 2;

    // Tag matching
    for (const tag of book.tags) {
      if (allText.includes(tag)) score += 2;

    // Boost deep cuts for well-read users
    const mentionsBooks = userResponses.some(r => {
      const t = r.text.toLowerCase();
      return books.some(b => t.includes(b.title.toLowerCase()) || t.includes(b.author.toLowerCase()));

    if (mentionsBooks && book.obscurity === 'deep') score += 3;
    if (mentionsBooks && book.obscurity === 'known') score -= 1;

    // Anti-matching: if they mentioned a book they didn't like, avoid similar tags
    const antiResponse = userResponses.find(r => r.promptId === 'anti');
    if (antiResponse) {
      const antiText = antiResponse.text.toLowerCase();

      const dislikedBook = books.find(b =>
        antiText.includes(b.title.toLowerCase()) || antiText.includes(b.author.toLowerCase())
      );
      if (dislikedBook) {
        const sharedTags = book.tags.filter(t => dislikedBook.tags.includes(t));
        score -= sharedTags.length * 2;
        if (book.pace === dislikedBook.pace) score -= 1;
        if (book.density === dislikedBook.density) score -= 1;
      }
    }

    // Pace matching from text cues
    if ((allText.includes('fast') || allText.includes('quick') || allText.includes('can\'t put down') || allText.includes('page turner') || allText.includes('up all night')) && (book.pace === 'swift' || book.pace === 'breathless')) score += 3;
    if ((allText.includes('slow') || allText.includes('savor') || allText.includes('leisurely') || allText.includes('sit with') || allText.includes('take my time')) && (book.pace === 'gentle' || book.pace === 'deliberate')) score += 3;

    // Small random factor to prevent same recommendation every time
    score += Math.random() * 2;

    return { book, score };
  });

  scores.sort((a, b) => b.score - a.score);
  return scores[0].book;
}

function buildContextNote(book) {
  // Build a contextual note based on what the user told us
  const notes = [];
  const allText = userResponses.map(r => r.text).join(' ').toLowerCase();

  // Length context
  if (book.length === 'one-sitting') {
    if (allText.includes('tonight') || allText.includes('evening'))
      notes.push("You can finish this tonight.");
    else if (allText.includes('flight'))
      notes.push("Short enough for a single flight.");
    else if (allText.includes('between meetings') || allText.includes('quick'))
      notes.push("Short — fits into the cracks of a busy day.");
  } else if (book.length === 'weekend') {
    if (allText.includes('trip') || allText.includes('vacation') || allText.includes('beach'))
      notes.push("Perfect trip length — done by the time you're home.");
    else if (allText.includes('weekend'))
      notes.push("A true weekend book.");
  } else if (book.length === 'commitment') {
    if (allText.includes('live with') || allText.includes('immerse') || allText.includes('nowhere to be'))
      notes.push("This is the long one you asked for.");
  }

  // Social context
  if (allText.includes('talk about') || allText.includes('book club') || allText.includes('discuss')) {
    if (book.obscurity === 'known')
      notes.push("People will have opinions about this one.");
    else
      notes.push("You'll be the one who brings it to the group.");
  }

  // Format context — show format note if they want audio, or always if it's notable
  const wantsAudio = allText.includes('listen') || allText.includes('driving') || allText.includes('hands busy') || allText.includes('commute') || allText.includes('cooking');
  if (book.formatNote && wantsAudio) {
    notes.push(book.formatNote);
  } else if (book.formatNote && !wantsAudio) {
    notes.push(book.formatNote);
  }

  return notes;
}

const usedBridges = new Set();

function selectBridge(book) {
  if (!book.bridges || book.bridges.length === 0) return '';
  if (Math.random() > 0.6) return ''; // sometimes just let the reason speak
  const allText = userResponses.map(r => r.text).join(' ').toLowerCase();
  let bestBridge = '';
  let bestScore = 0;
  for (const b of book.bridges) {
    if (usedBridges.has(b.bridge)) continue; // never repeat in a session
    const hits = b.when.filter(w => allText.includes(w)).length;
    if (hits > bestScore) {
      bestScore = hits;
      bestBridge = b.bridge;
    }
  }
  if (bestBridge) usedBridges.add(bestBridge);
  return bestBridge;
}

function bookshopUrl(book) {
  const q = encodeURIComponent(book.title + ' ' + book.author);
  return `https://bookshop.org/search?keywords=${q}`;
}

function presentRecommendation(book) {
  conversationState = 'recommending';
  setWaterState('pulsing');

  let html = `<span class="text-book-title">${book.title}</span><br>`;
  html += `<span class="text-book-author">${book.author}</span>`;

  showText(html, () => {
    setTimeout(() => {
      let reasonHtml = `<span class="text-book-title">${book.title}</span><br>`;
      reasonHtml += `<span class="text-book-author">${book.author}</span><br><br>`;

      const bridge = selectBridge(book);
      if (bridge) {
        reasonHtml += `<span style="color: rgba(255,220,180,0.75); font-style: italic;">${bridge}</span> `;
      }
      reasonHtml += book.reason;

      const contextNotes = buildContextNote(book);
      if (contextNotes.length > 0) {
        reasonHtml += `<br><br><span style="color: rgba(255,220,180,0.6); font-size: 0.9em;">${contextNotes.join(' ')}</span>`;
      }

      reasonHtml += `<br><br><a href="${bookshopUrl(book)}" target="_blank" rel="noopener" style="color: rgba(255,220,180,0.4); font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 300; text-decoration: none; border-bottom: 1px solid rgba(255,220,180,0.15); transition: color 0.3s ease;" onmouseover="this.style.color='rgba(255,220,180,0.7)'" onmouseout="this.style.color='rgba(255,220,180,0.4)'">find it on bookshop.org</a>`;

      textEl.innerHTML = reasonHtml;
      setWaterState('still');
      showFeedback();
      addToHistory(book, 'surfaced');
    }, 2200);
  });
}

// ─── SHELF & HISTORY ──────────────────────────────────────────
let shelf = [];
let sessionHistory = [];
const shelfPanel = document.getElementById('shelf-panel');
const shelfBooksEl = document.getElementById('shelf-books');
const historyBooksEl = document.getElementById('history-books');
const shelfViewBtn = document.getElementById('shelf-view-btn');
const shelfBtn = document.getElementById('shelf-btn');
const shelfClose = document.getElementById('shelf-close');
const shelfCopy = document.getElementById('shelf-copy');
const shelfShare = document.getElementById('shelf-share');
const shelfCopied = document.getElementById('shelf-copied');
const panelTabs = document.querySelectorAll('.panel-tab');

// Tab switching
panelTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    panelTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

function addToHistory(book, action) {
  const lastResponse = userResponses.length > 0 ? userResponses[userResponses.length - 1].text : '';
  sessionHistory.push({ book, action, youSaid: lastResponse, time: new Date() });
  shelfViewBtn.classList.add('visible');
  renderHistory();
}

function addToShelf(book) {
  if (shelf.find(b => b.title === book.title)) return;
  shelf.push(book);
  // Update history entry to reflect shelf status
  const entry = sessionHistory.find(h => h.book.title === book.title);
  if (entry) entry.action = 'shelved';
  shelfViewBtn.classList.add('visible');
  renderShelf();
  renderHistory();
}

function renderShelf() {
  if (shelf.length === 0) {
    shelfBooksEl.innerHTML = '<div class="history-empty">Books you save will appear here.</div>';
    return;
  }
  shelfBooksEl.innerHTML = shelf.map(b =>
    `<div class="shelf-book">
      <div class="shelf-book-title">${b.title}</div>
      <div class="shelf-book-author">${b.author}</div>
      <div class="shelf-book-reason">${b.reason}</div>
      <a href="${bookshopUrl(b)}" target="_blank" rel="noopener" style="color: rgba(255,220,180,0.35); font-family: 'Inter', sans-serif; font-size: 0.7rem; text-decoration: none; border-bottom: 1px solid rgba(255,220,180,0.1);">bookshop.org</a>
    </div>`
  ).join('');
}

function renderHistory() {
  if (sessionHistory.length === 0) {
    historyBooksEl.innerHTML = '<div class="history-empty">Books will appear here as they\'re surfaced.</div>';
    return;
  }
  historyBooksEl.innerHTML = sessionHistory.map(h => {
    let actionLabel = '';
    if (h.action === 'shelved') actionLabel = 'saved to shelf';
    else if (h.action === 'read') actionLabel = 'already read';
    else if (h.action === 'skipped') actionLabel = 'tried another';
    return `<div class="history-entry">
      ${h.youSaid ? `<div class="history-you-said">"${h.youSaid}"</div>` : ''}
      <div class="history-book-title">${h.book.title}</div>
      <div class="history-book-author">${h.book.author}</div>
      ${actionLabel ? `<div class="history-action">${actionLabel}</div>` : ''}
    </div>`;
  }).join('');
}

function shelfToText() {
  return "My Echolalia Shelf\n\n" + shelf.map((b, i) =>
    `${i + 1}. ${b.title} — ${b.author}\n   ${b.reason}`
  ).join('\n\n');
}

// ─── EVENT LISTENERS ───────────────────────────────────────────

// Push-to-talk: spacebar hold
let spaceHeld = false;
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !spaceHeld && conversationState === 'listening' && document.activeElement !== textInput) {
    e.preventDefault();
    spaceHeld = true;
    startListening();
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' && spaceHeld) {
    e.preventDefault();
    spaceHeld = false;
    if (fullTranscript.trim()) {
      finishListening(fullTranscript.trim());
    } else {
      stopListening();
    }
  }
});

// Mic button: also works as push-to-talk (hold) or toggle (click)
// Mic button: click to toggle on/off, or hold to push-to-talk
let micPressStart = 0;
let micHeld = false;

function micStop() {
  if (fullTranscript.trim()) {
    finishListening(fullTranscript.trim());
  } else {
    stopListening();
  }
}

micBtn.addEventListener('mousedown', (e) => {
  e.preventDefault();
  micPressStart = Date.now();
  micHeld = true;
  // If not already on, start immediately (for hold-to-talk feel)
  if (!micBtn.classList.contains('listening') && conversationState === 'listening') {
    startListening();
  }
});

micBtn.addEventListener('mouseup', (e) => {
  e.preventDefault();
  if (!micHeld) return;
  micHeld = false;
  const held = Date.now() - micPressStart;
  if (held > 400) {
    // Was a hold — release means stop
    micStop();
  } else {
    // Was a click — if already listening, stop; otherwise it just started in mousedown
    if (micBtn.classList.contains('listening') && fullTranscript.trim()) {
      // Already have speech from a previous toggle-on click — stop now
      micStop();
    }
    // If just started in mousedown with no transcript yet, leave it running (toggle on)
  }
});

micBtn.addEventListener('mouseleave', () => {
  if (micHeld) {
    micHeld = false;
    micStop();
  }
});

// Touch
micBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  micPressStart = Date.now();
  micHeld = true;
  if (!micBtn.classList.contains('listening') && conversationState === 'listening') {
    startListening();
  }
});

micBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!micHeld) return;
  micHeld = false;
  const held = Date.now() - micPressStart;
  if (held > 400) {
    micStop();
  } else {
    if (micBtn.classList.contains('listening') && fullTranscript.trim()) {
      micStop();
    }
  }
});

sendBtn.addEventListener('click', () => {
  if (textInput.value.trim()) {
    handleUserInput(textInput.value);
    textInput.value = '';
  }
});

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && textInput.value.trim()) {
    handleUserInput(textInput.value);
    textInput.value = '';
  }
});

skipBtn.addEventListener('click', skipQuestion);

// Shelf button — save and show another
shelfBtn.addEventListener('click', () => {
  if (currentRecommendation) {
    addToShelf(currentRecommendation);
    hideFeedback();
    rejectedBooks.push(currentRecommendation.title);
    setWaterState('rippling');
    addRipple(); addRipple();
    showText("Saved. Let me find you another...", () => {
      setTimeout(() => {
        const book = findBestMatch();
        if (book) {
          currentRecommendation = book;
          presentRecommendation(book);
        } else {
          showText("That's everything I have for you right now. Your shelf is waiting.");
        }
      }, 1800);
    });
  }
});

readItBtn.addEventListener('click', () => {
  hideFeedback();
  const entry = sessionHistory.find(h => h.book.title === currentRecommendation.title);
  if (entry) entry.action = 'read';
  renderHistory();
  rejectedBooks.push(currentRecommendation.title);
  setWaterState('rippling');
  addRipple(); addRipple();
  showText("You've read it. Let me think of another...", () => {
    setTimeout(() => {
      const book = findBestMatch();
      if (book) {
        currentRecommendation = book;
        presentRecommendation(book);
      } else {
        showText("I've shared everything I have that feels right. Come back sometime — I'll have more to say.");
      }
    }, 1800);
  });
});

let rejectionCount = 0;
const rejectionFollowups = [
  "What put you off — the vibe, the topic, or something else?",
  "Too heavy? Too light? Too familiar? Help me recalibrate.",
  "Tell me more about what you're not looking for — that's useful too.",
  "What would make this one better — or is it the wrong direction entirely?",
];

tryAgainBtn.addEventListener('click', () => {
  hideFeedback();
  const entry = sessionHistory.find(h => h.book.title === currentRecommendation.title);
  if (entry) entry.action = 'skipped';
  renderHistory();
  rejectedBooks.push(currentRecommendation.title);
  rejectionCount++;
  setWaterState('rippling');
  addRipple(); addRipple(); addRipple();

  // Every 2nd rejection (or first one), ask what they didn't like
  if (rejectionCount === 1 || rejectionCount % 2 === 0) {
    const followup = rejectionFollowups[Math.floor(Math.random() * rejectionFollowups.length)];
    conversationState = 'asking';
    showText(followup, () => {
      conversationState = 'listening';
      setWaterState('listening');
      showInput();
      // Override handleUserInput temporarily to capture rejection feedback
      const originalHandler = handleUserInput;
      handleUserInput = function(text) {
        handleUserInput = originalHandler; // restore
        if (!text.trim()) return;
        hideInput();
        // Add this as a response to improve matching
        userResponses.push({ promptId: 'rejection-feedback', type: 'open', text: text.trim() });
        setWaterState('rippling');
        addRipple(); addRipple();
        showText("Got it. Let me try something different.", () => {
          setTimeout(() => {
            const book = findBestMatch();
            if (book) {
              currentRecommendation = book;
              presentRecommendation(book);
            } else {
              showText("I've shared everything I have that feels right. Come back sometime — I'll have more to say.");
            }
          }, 1800);
        });
      };
    });
  } else {
    showText("Let me look deeper...", () => {
      setTimeout(() => {
        const book = findBestMatch();
        if (book) {
          currentRecommendation = book;
          presentRecommendation(book);
        } else {
          showText("I've shared everything I have that feels right. Come back sometime — I'll have more to say.");
        }
      }, 1800);
    });
  }
});

// Shelf panel
shelfViewBtn.addEventListener('click', () => shelfPanel.classList.add('open'));
shelfClose.addEventListener('click', () => shelfPanel.classList.remove('open'));

shelfCopy.addEventListener('click', () => {
  navigator.clipboard.writeText(shelfToText()).then(() => {
    shelfCopied.classList.add('visible');
    setTimeout(() => shelfCopied.classList.remove('visible'), 2000);
  });
});

shelfShare.addEventListener('click', () => {
  const text = shelfToText();
  if (navigator.share) {
    navigator.share({ title: 'My Echolalia Shelf', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => {
      shelfCopied.textContent = 'copied to clipboard — share anywhere';
      shelfCopied.classList.add('visible');
      setTimeout(() => {
        shelfCopied.classList.remove('visible');
        shelfCopied.textContent = 'copied to clipboard';
      }, 2500);
    });
  }
});

// Feedback
document.getElementById('feedback-send').addEventListener('click', () => {
  const feedbackText = document.getElementById('feedback-text');
  const thanks = document.getElementById('feedback-thanks');
  if (!feedbackText.value.trim()) return;
  // TODO: send to webhook/endpoint when backend exists
  console.log('Echolalia feedback:', feedbackText.value, { history: sessionHistory.map(h => h.book.title), shelf: shelf.map(b => b.title) });
  feedbackText.value = '';
  thanks.style.opacity = '1';
  setTimeout(() => { thanks.style.opacity = '0'; }, 3000);
});

restartBtn.addEventListener('click', () => {
  currentPromptIndex = 0;
  userResponses = [];
  currentRecommendation = null;
  rejectedBooks = [];
  prompts = buildPromptSequence(); // fresh questions each time
  hideFeedback();
  hideInput();
  hideText();
  showText("Welcome back.", () => {
    setTimeout(() => askNextQuestion(), 600);
  });
});
</script>
